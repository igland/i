name: Generate Image Gallery

on:
  push:
    paths:
      - 'p/**'
      - '.github/workflows/generate-gallery.yml'
  workflow_dispatch:

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index.html gallery
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>📸 Image Gallery</title>
            <style>
              body { font-family: sans-serif; margin: 0; background: #fafafa; }
              .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; }
              .gallery img { width: 100%; height: auto; border-radius: 8px; object-fit: cover; transition: transform .3s; }
              .gallery img:hover { transform: scale(1.05); }
            </style>
          </head>
          <body>
            <h1 style="text-align:center; padding-top:20px;">📸 Image Gallery</h1>
            <div class="gallery">
          EOF

          for img in p/*.{jpg,jpeg,png,gif,webp}; do
            [ -f "$img" ] || continue
            echo "  <img src=\"$img\" alt=\"${img##*/}\">" >> index.html
          done

          cat >> index.html << 'EOF'
            </div>
          </body>
          </html>
          EOF

      - name: Commit and push index.html
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add index.html
          git diff-index --quiet HEAD || git commit -m "chore: auto-generate gallery" && git push
