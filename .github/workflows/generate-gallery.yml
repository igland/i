name: Generate Image Gallery

on:
  push:
    paths:
      - 'p/**'
      - '.github/workflows/generate-gallery.yml'
  workflow_dispatch:

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index.html
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>📷 Gallery</title>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
              body { margin: 0; font-family: sans-serif; background: #fafafa; }
              #gallery-container { height: 100vh; overflow-y: auto; padding: 20px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
              .img-box { position: relative; cursor: zoom-in; }
              .img-box img { width: 100%; border-radius: 8px; object-fit: cover; transition: transform .3s; }
              .img-box img:hover { transform: scale(1.05); }
            </style>
            <link rel="stylesheet" href="https://unpkg.com/photoswipe@5.4.2/dist/photoswipe.css" />
          </head>
          <body>
            <h1 style="text-align:center; padding-top:20px;">📸 Image Gallery</h1>
            <div id="gallery-container">
              <div id="gallery" class="grid"></div>
            </div>

            <script type="module">
              import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5.4.2/dist/photoswipe-lightbox.esm.js';
              import 'https://unpkg.com/photoswipe@5.4.2/dist/photoswipe.css';

              const imagePaths = [
          EOF

          for img in p/*.{jpg,jpeg,png,gif,webp}; do
            [ -f "$img" ] || continue
            echo "                '$img'," >> index.html
          done

          cat >> index.html << 'EOF'
              ];

              const galleryEl = document.getElementById('gallery');
              const buffer = 30;
              let start = 0;

              function loadBatch() {
                const end = Math.min(start + buffer, imagePaths.length);
                for (let i = start; i < end; i++) {
                  const src = imagePaths[i];
                  const wrapper = document.createElement('a');
                  wrapper.href = src;
                  wrapper.setAttribute('data-pswp-width', 1600);
                  wrapper.setAttribute('data-pswp-height', 1200);
                  wrapper.className = 'img-box';
                  const img = document.createElement('img');
                  img.src = src;
                  img.alt = src.split('/').pop();
                  wrapper.appendChild(img);
                  galleryEl.appendChild(wrapper);
                }
                start = end;
              }

              const container = document.getElementById('gallery-container');
              container.addEventListener('scroll', () => {
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 300) {
                  loadBatch();
                }
              });

              loadBatch();

              const lightbox = new PhotoSwipeLightbox({
                gallery: '#gallery',
                children: 'a',
                pswpModule: () => import('https://unpkg.com/photoswipe@5.4.2/dist/photoswipe.esm.js'),
              });
              lightbox.init();
            </script>
          </body>
          </html>
          EOF

      - name: Commit and push index.html
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}
          git add index.html
          git diff-index --quiet HEAD || git commit -m "chore: auto-generate gallery" && git push
